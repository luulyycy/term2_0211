<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>怎麼辦！我的行李 · 空白輸入版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: linear-gradient(145deg, #eef4fc 0%, #dde9fa 100%);

        }

        .glass-card {
            max-width: 1550px;

        }

        h1 {
            display: flex;

            gap: 16px;

            font-size: 2.4rem;

            margin-bottom: 4px;
            letter-spacing: -0.5px;
        }
        .badge-free {
            background: #b4d0f0;

        .sub-headline {

        .input-panel {

        .flex-row {
            display: flex;
            flex-wrap: wrap;

            align-items: flex-end;
        }

        .field {
            flex: 1 1 140px;
        }

            margin-bottom: 8px;
            font-size: 1rem;
            letter-spacing: 0.3px;
        }
        .field input, .field select {
            width: 100%;

            border: none;

        .field input:focus, .field select:focus {
            outline: none;
            border-color: #86acd7;
            background: white;
        }
        .field input[type="date"] {

        }

        .space-options {
            display: flex;

        }
        .space-option {
            display: flex;

        .space-option.selected {

        .space-option input[type="radio"] {

        .btn-group {

        .btn-analyze {

        .btn-clear {

        .weather-summary {

        .empty-state {

        .result-header {

        .dest-gender-badge {

        }
        .badge-dest {

            padding: 6px 26px;
            border-radius: 60px;
            font-weight: 600;
            color: #103658;
        }
        .badge-gender {
            background: #d9e1f0;
            padding: 6px 26px;
            border-radius: 60px;
            font-weight: 600;
            color: #1b3d5e;
        }

        .summary-block {
            background: #e4f0fd;
            border-radius: 60px;
            padding: 16px 28px;
            margin-bottom: 28px;
            display: flex;
            align-items: center;
            gap: 22px;
            flex-wrap: wrap;
            font-size: 1.2rem;
            font-weight: 500;
            color: #19537c;
        }
        .nights-badge {
            background: #1f527c;
            color: white;
            padding: 8px 32px;
            border-radius: 60px;
            font-size: 1.5rem;
            font-weight: 600;
        }

        /* 行李箱建議區塊 */
        .luggage-recommend {
            background: linear-gradient(135deg, #f6f9ff, #eaf2ff);
            border-radius: 40px;
            padding: 18px 25px;
            margin-bottom: 25px;
            border: 2px solid #acc6e9;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
        }
        .luggage-size {
            font-size: 2.2rem;
            font-weight: 800;
            color: #0a3f6b;
        }
        .luggage-detail {
            display: flex;
            gap: 25px;
            flex-wrap: wrap;
        }
        .space-indicator {
            background: white;
            border-radius: 60px;
            padding: 8px 22px;
            font-weight: 600;
            border: 1px solid #8fb0da;
        }
        .progress-bar-bg {
            width: 200px;
            height: 18px;
            background: #d9e6f5;
            border-radius: 30px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: #1f527c;
            border-radius: 30px;
            width: 0%;
        }
        .luggage-note {
            font-size: 0.9rem;
            color: #2d618c;
            margin-top: 8px;
            font-style: italic;
        }

        /* 大類別標題 */
        .main-category {
            font-size: 1.6rem;
            font-weight: 700;
            color: #0e3d60;
            margin: 25px 0 15px 0;
            padding-left: 10px;
            border-left: 8px solid #1f527c;
        }
        .main-category:first-of-type {
            margin-top: 5px;
        }
        
        /* 一排過標籤格式 */
        .category-row {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 25px;
            justify-content: flex-start;
        }
        
        .item-group {
            background: white;
            border-radius: 24px;
            padding: 16px 18px;
            box-shadow: 0 4px 12px rgba(0,30,60,0.05);
            border: 1px solid #eef4ff;
            flex: 1 1 280px;
            min-width: 280px;
        }
        
        .group-title {
            font-weight: 700;
            color: #1e4e78;
            margin-bottom: 12px;
            font-size: 1.1rem;
            border-bottom: 2px solid #deecfd;
            padding-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .items-horizontal {
            display: flex;
            flex-wrap: wrap;
            gap: 8px 10px;
        }
        
        .item-badge {
            background: #f5faff;
            border-radius: 40px;
            padding: 6px 14px;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            border: 1px solid #d4e4fc;
            color: #1d4970;
            white-space: nowrap;
        }
        
        .item-badge .count {
            background: #1f527c;
            color: white;
            border-radius: 30px;
            padding: 2px 10px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-left: 4px;
        }
        
        .item-badge .check {
            background: #5e8ab9;
            color: white;
            border-radius: 30px;
            padding: 2px 10px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-left: 4px;
        }
        
        .item-badge .ml-note {
            font-size: 0.7rem;
            color: #6f8eb0;
            margin-left: 4px;
            font-weight: 400;
        }
        
        .item-badge .optional {
            background: #b8b8b8;
            color: white;
            border-radius: 30px;
            padding: 2px 8px;
            font-size: 0.7rem;
            font-weight: 600;
            margin-left: 4px;
        }
        
        .footnote {
            margin-top: 25px;
            background: #dfedfd;
            padding: 16px 30px;
            border-radius: 50px;
            color: #26537c;
            text-align: center;
            font-size: 0.95rem;
            clear: both;
        }
        
        .error-msg {
            background: #ffe7e3;
            color: #b14040;
            padding: 18px 30px;
            border-radius: 40px;
            border-left: 8px solid #c75c5c;
            font-weight: 500;
        }
    </style>
</head>
<body>
<div class="glass-card">
    <h1>
        😱 怎麼辦！我的行李
        <span class="badge-free">空白輸入版</span>
    </h1>
    <div class="sub-headline">只要經過小小的計算，可以幫你輕鬆解決旅行帶東西的問題</div>

    <div class="input-panel">
        <div class="flex-row">
            <div class="field">
                <label>📍 目的地</label>
                <input type="text" id="destInput" placeholder="例：北京、北海道" value="">
            </div>
            <div class="field">
                <label>📅 出發日期</label>
                <input type="date" id="dateInput" value="2026-07-15">
            </div>
            <div class="field">
                <label>🌙 過夜數</label>
                <input type="number" id="nightsInput" min="1" max="365" placeholder="例：7天" value="">
            </div>
            <div class="field">
                <label>⚥ 性別</label>
                <select id="genderSelect">
                    <option value="" disabled selected>請選擇</option>
                    <option value="male">男性</option>
                    <option value="female">女性</option>
                </select>
            </div>
            <div class="field">
                <label>🏊 泳衣？</label>
                <select id="swimSelect">
                    <option value="" disabled selected>請選擇</option>
                    <option value="no">不需要</option>
                    <option value="yes">需要</option>
                </select>
            </div>
        </div>
        
        <!-- 行李箱剩餘空間選擇 -->
        <div style="margin: 15px 0 5px 0; font-weight: 600; color: #1e4468;">🧳 希望行李箱剩餘空間：</div>
        <div class="space-options" id="spaceOptions">
            <label class="space-option selected">
                <input type="radio" name="space" value="5" checked> 5%
            </label>
            <label class="space-option">
                <input type="radio" name="space" value="10"> 10%
            </label>
            <label class="space-option">
                <input type="radio" name="space" value="20"> 20%
            </label>
        </div>

        <div class="btn-group">
            <button class="btn-analyze" id="analyzeBtn"><span>🌤️</span> 分析行李與行李箱</button>
            <button class="btn-clear" id="clearBtn"><span>🧽</span> 清空所有</button>
        </div>
    </div>

    <div class="result-area" id="resultPanel">
        <div id="resultContent" class="empty-state">
            <div class="big-icon">🧳✨</div>
            <p>請填寫上方資訊，點擊「分析行李與行李箱」查看結果</p>
        </div>
    </div>
</div>

<script>
    (function() {
        // ==================== 天氣資料庫 ====================
        const weatherDB = {
            '北京': {
                '3月': { tempRange: '4~15°C', condition: '多雲轉晴', season: '春天', thick: false },
                '4月': { tempRange: '10~22°C', condition: '晴時多雲', season: '春天', thick: false },
                '5月': { tempRange: '16~28°C', condition: '晴朗', season: '夏天', thick: false },
                '6月': { tempRange: '20~32°C', condition: '炎熱', season: '夏天', thick: false },
                '7月': { tempRange: '23~35°C', condition: '炎熱潮濕', season: '夏天', thick: false },
                '8月': { tempRange: '22~34°C', condition: '炎熱', season: '夏天', thick: false },
                '12月': { tempRange: '-5~3°C', condition: '寒冷乾燥', season: '冬天', thick: true },
                '1月': { tempRange: '-8~2°C', condition: '嚴寒', season: '冬天', thick: true },
                '2月': { tempRange: '-5~5°C', condition: '寒冷', season: '冬天', thick: true }
            },
            '北海道': {
                '3月': { tempRange: '-2~5°C', condition: '多雲有雪', season: '冬天', thick: true },
                '7月': { tempRange: '18~26°C', condition: '涼爽', season: '夏天', thick: false },
                '8月': { tempRange: '19~27°C', condition: '涼爽', season: '夏天', thick: false },
                '12月': { tempRange: '-6~2°C', condition: '大雪', season: '冬天', thick: true },
                '1月': { tempRange: '-8~0°C', condition: '嚴寒大雪', season: '冬天', thick: true },
                '2月': { tempRange: '-7~1°C', condition: '多雪', season: '冬天', thick: true }
            },
            '曼谷': {
                '3月': { tempRange: '26~36°C', condition: '炎熱', season: '夏天', thick: false },
                '4月': { tempRange: '27~38°C', condition: '酷熱', season: '夏天', thick: false },
                '5月': { tempRange: '26~35°C', condition: '炎熱有雨', season: '夏天', thick: false },
                '6月': { tempRange: '25~34°C', condition: '雨季', season: '夏天', thick: false },
                '7月': { tempRange: '25~33°C', condition: '雨季', season: '夏天', thick: false },
                '12月': { tempRange: '21~32°C', condition: '涼爽乾燥', season: '冬天', thick: false }
            }
        };

        function getMonthFromDate(dateStr) {
            if (!dateStr) return null;
            const date = new Date(dateStr);
            const month = date.getMonth() + 1;
            const monthMap = {
                1: '1月', 2: '2月', 3: '3月', 4: '4月', 5: '5月', 6: '6月',
                7: '7月', 8: '8月', 9: '9月', 10: '10月', 11: '11月', 12: '12月'
            };
            return monthMap[month];
        }

        function getWeather(dest, monthStr) {
            if (!dest || !monthStr) return null;
            for (let key in weatherDB) {
                if (dest.includes(key) || key.includes(dest)) {
                    if (weatherDB[key][monthStr]) {
                        return weatherDB[key][monthStr];
                    }
                }
            }
            return null;
        }

        // ==================== 根據天數決定行李箱尺寸 ====================
        function getLuggageSizeByNights(nights) {
            if (nights >= 1 && nights <= 14) {
                return { size: '24～26吋', range: '7~14天短期長旅', desc: '最剛好' };
            } else if (nights >= 15 && nights <= 30) {
                return { size: '28吋', range: '15~30天一個月', desc: '最實用' };
            } else if (nights >= 31 && nights <= 90) {
                return { size: '29～30吋', range: '1~3個月長期旅居', desc: '適合長期' };
            } else if (nights > 90) {
                return { size: '32吋', range: '3個月以上～半年、一年', desc: '最大托運行李箱' };
            } else {
                return { size: '24吋', range: '短期旅行', desc: '一般建議' };
            }
        }

        // ==================== 超完整公式計算（分為跟身/行李） ====================
        function calculateAllItems(nights, weather, gender, needSwim) {
            const isFemale = gender === 'female';
            const isWinter = weather ? weather.season === '冬天' : false;
            const season = weather ? weather.season : (isWinter ? '冬天' : '夏天');
            
            // 跟身類 (隨身攜帶)
            const carryOn = {};
            
            // 行李類 (托運/大件)
            const checked = {};

            // ----- 跟身類 -----
            // 證件錢包 (全部跟身)
            carryOn.documents = [
                { name: '護照', check: true, icon: '🪪' },
                { name: '身分證', check: true, icon: '🆔' },
                { name: '健保卡', check: true, icon: '🏥' },
                { name: '信用卡', count: 2, icon: '💳' },
                { name: '現金', note: '預算×0.3', icon: '💰' },
                { name: '飛機票', check: true, icon: '🎫' },
                { name: '訂房紀錄', check: true, icon: '📄' }
            ];

            // 3C隨身
            carryOn.electronics = [
                { name: '手機', count: 1, icon: '📱' },
                { name: '充電線', count: 1, icon: '🔌' },
                { name: '充電頭', count: 1, icon: '⚡' },
                { name: '行動電源', count: 1, icon: '🔋' },
                { name: '耳機', count: 1, icon: '🎧' }
            ];

            // 藥品隨身 (小量)
            carryOn.medicine = [
                { name: '個人藥物', count: nights, icon: '💉' },
                { name: '創可貼', count: 5, icon: '🩹' }
            ];

            // 雜項隨身
            carryOn.misc = [
                { name: '口罩', count: nights + 5, icon: '😷' },
                { name: '濕紙巾', count: 1, icon: '🧻' },
                { name: '衛生紙', count: 1, icon: '🧻' },
                { name: '水壺', count: 1, icon: '🥤' },
                { name: '雨傘', count: 1, icon: '☂️' }
            ];

            // ----- 行李類 -----
            // 衣物類 (全部行李)
            checked.clothing = [
                { name: '上衣', count: nights + 2, icon: '👕' },
                { name: isFemale ? '褲/裙' : '褲子', count: Math.ceil(nights / 2), icon: isFemale ? '👗' : '👖' },
                { name: '內衣褲', count: nights + 3, icon: '🩲' },
                { name: '襪子', count: nights + 2, icon: '🧦' },
                { name: '睡衣', count: Math.ceil(nights / 3), icon: '😴' },
                { name: '外套', count: isWinter ? 2 : 1, icon: '🧥' },
                { name: '帽子', count: 1, icon: '🧢' },
                { name: '墨鏡', count: 1, icon: '🕶️' }
            ];
            
            if (needSwim === 'yes') {
                checked.clothing.push({ name: '泳衣', count: 1, icon: '🏊' });
            }
            
            if (isFemale) {
                checked.clothing.push({ name: '胸罩', count: nights + 3, icon: '👙' });
                checked.clothing.push({ name: '衛生棉', check: true, icon: '🩸' });
            }

            // 盥洗用品 (行李)
            checked.toiletries = [
                { name: '牙刷', count: 1, icon: '🪥' },
                { name: '牙膏', count: 1, ml: '50g', icon: '🦷' },
                { name: '洗髮精', count: 1, ml: '80ml', icon: '🧴' },
                { name: '沐浴乳', count: 1, ml: '80ml', icon: '🧼' },
                { name: '洗面乳', count: 1, ml: '50ml', icon: '🧖' },
                { name: '化妝棉', count: nights * 5, icon: '📦' },
                { name: '毛巾', count: nights >= 4 ? 2 : 1, icon: '🧻' },
                { name: '刮鬍刀', count: 1, icon: '🪒' },
                { name: '刮鬍泡', count: 1, ml: '50ml', icon: '🧴' },
                { name: '梳子', count: 1, icon: '💇' }
            ];

            // 美妝保養 (行李)
            if (isFemale) {
                checked.beauty = [
                    { name: '化妝水', count: 1, ml: '50ml', icon: '💧' },
                    { name: '乳液', count: 1, ml: '50ml', icon: '🧴' },
                    { name: '防曬', count: 1, ml: '50ml', icon: '☀️' },
                    { name: '粉底', count: 1, ml: '30ml', icon: '💄' },
                    { name: '口紅', count: 2, icon: '💋' },
                    { name: '眼影', count: 1, icon: '👁️' },
                    { name: '睫毛膏', count: 1, icon: '✨' },
                    { name: '卸妝油', count: 1, ml: '50ml', icon: '🧴' }
                ];
            } else {
                checked.beauty = [
                    { name: '防曬', count: 1, ml: '50ml', icon: '☀️' }
                ];
            }

            // 藥品 (行李)
            checked.medicine = [
                { name: '腸胃藥', count: 1, icon: '💊' },
                { name: '止痛藥', count: 1, icon: '💊' },
                { name: '感冒藥', count: 1, icon: '💊' },
                { name: '蚊蟲藥', count: 1, icon: '🦟' }
            ];

            // 3C選帶 (行李)
            checked.electronics = [
                { name: '平板/筆電', optional: true, icon: '💻' },
                { name: '相機', optional: true, icon: '📷' },
                { name: '記憶卡', optional: true, icon: '💾' },
                { name: '轉接頭', count: 1, icon: '🔌' }
            ];

            // 雜項 (行李)
            checked.misc = [
                { name: '鎖頭', optional: true, icon: '🔒' },
                { name: '筆+筆記本', optional: true, icon: '✏️' },
                { name: '購物袋', count: 1, icon: '🛍️' }
            ];

            // 行李箱類
            checked.luggage = [
                { name: '登機箱', count: 1, icon: '🧳' },
                { name: '背包', count: 1, icon: '🎒' },
                { name: '收納袋', count: Math.ceil(nights / 2), icon: '📦' },
                { name: '鞋袋', count: 1, icon: '👟' }
            ];

            return { carryOn, checked, season };
        }

        // ==================== 渲染結果 ====================
        function renderResult(dest, dateStr, nights, gender, needSwim, remainingSpace) {
            const destName = dest.trim() || '未知地點';
            const nightsNum = parseInt(nights);
            
            if (isNaN(nightsNum) || nightsNum < 1) {
                document.getElementById('resultContent').innerHTML = `<div class="error-msg">❌ 請輸入有效的過夜天數</div>`;
                return;
            }
            
            if (!gender) {
                document.getElementById('resultContent').innerHTML = `<div class="error-msg">❌ 請選擇性別</div>`;
                return;
            }
            
            if (!needSwim) {
                document.getElementById('resultContent').innerHTML = `<div class="error-msg">❌ 請選擇是否需要泳衣</div>`;
                return;
            }
            
            const monthStr = getMonthFromDate(dateStr);
            const weather = getWeather(destName, monthStr);
            
            const { carryOn, checked, season } = calculateAllItems(nightsNum, weather, gender, needSwim);
            
            // 根據天數取得行李箱建議
            const luggageInfo = getLuggageSizeByNights(nightsNum);
            
            // 計算總件數
            let totalCarry = 0;
            let totalChecked = 0;
            
            for (let cat in carryOn) {
                carryOn[cat].forEach(item => {
                    if (typeof item.count === 'number') totalCarry += item.count;
                });
            }
            for (let cat in checked) {
                checked[cat].forEach(item => {
                    if (typeof item.count === 'number') totalChecked += item.count;
                });
            }
            const total = totalCarry + totalChecked;
            
            // 天氣區塊
            let weatherHtml = '';
            if (weather) {
                weatherHtml = `
                    <div class="weather-summary">
                        <div class="weather-icon">${weather.season === '冬天' ? '❄️' : '☀️'}</div>
                        <div>
                            <span class="weather-temp">${weather.tempRange}</span>
                            <span class="weather-desc">${weather.condition}</span>
                            <div style="font-size:0.9rem;">季節：${weather.season}</div>
                        </div>
                        <div class="season-badge">${weather.season === '冬天' ? '❄️ 冬季衣物加厚' : '☀️ 夏季衣物輕薄'}</div>
                    </div>
                `;
            } else {
                weatherHtml = `
                    <div class="weather-summary" style="background:#fff0d0;">
                        <div class="weather-icon">🔍</div>
                        <div>${monthStr} 季節：${season}（參考用）</div>
                        <div class="season-badge">${season === '冬天' ? '❄️ 冬季' : '☀️ 夏季'}</div>
                    </div>
                `;
            }
            
            // 類別標題與圖示
            const catInfo = {
                documents: { title: '📁 證件錢包', icon: '📁' },
                electronics: { title: '📱 3C電子', icon: '📱' },
                medicine: { title: '💊 藥品', icon: '💊' },
                misc: { title: '🎒 雜項', icon: '🎒' },
                clothing: { title: '👔 衣物類', icon: '👔' },
                toiletries: { title: '🧴 盥洗用品', icon: '🧴' },
                beauty: { title: '💄 美妝保養', icon: '💄' },
                luggage: { title: '🧳 行李箱', icon: '🧳' }
            };
            
            let html = `
                <div class="result-header">
                    <h2>🧳 完整行李清單</h2>
                    <div class="dest-gender-badge">
                        <span class="badge-dest">${destName}</span>
                        <span class="badge-gender">${gender === 'male' ? '♂️ 男性' : '♀️ 女性'}</span>
                    </div>
                </div>
                ${weatherHtml}
                
                <!-- 行李箱建議區塊 (天數對應尺寸) -->
                <div class="luggage-recommend">
                    <div>
                        <span style="font-size:1.2rem; color:#1d4e78;">🧳 建議行李箱尺寸：</span>
                        <span class="luggage-size">${luggageInfo.size}</span>
                        <div class="luggage-note">${luggageInfo.range} · ${luggageInfo.desc}</div>
                    </div>
                    <div class="luggage-detail">
                        <div class="space-indicator">剩餘空間要求：${remainingSpace}%</div>
                        <div style="display:flex; align-items:center; gap:10px;">
                            <span>使用率 ${100 - remainingSpace}%</span>
                            <div class="progress-bar-bg">
                                <div class="progress-fill" style="width:${100 - remainingSpace}%;"></div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="summary-block">
                    <span class="nights-badge">${nightsNum} 晚</span>
                    <span>總共 <strong style="font-size:1.8rem;">${Math.round(total)}</strong> 件物品</span>
                    <span>（跟身 ${totalCarry} 件 · 行李 ${totalChecked} 件）</span>
                </div>
                
                <div class="main-category">👤 跟身類（隨身攜帶）</div>
                <div class="category-row">
            `;
            
            // 跟身類
            for (let cat in carryOn) {
                html += `<div class="item-group">`;
                html += `<div class="group-title">${catInfo[cat]?.title || cat}</div>`;
                html += `<div class="items-horizontal">`;
                
                carryOn[cat].forEach(item => {
                    let content = `${item.icon} ${item.name}`;
                    
                    if (item.count !== undefined) {
                        content += ` <span class="count">${item.count}</span>`;
                    } else if (item.check) {
                        content += ` <span class="check">✓</span>`;
                    }
                    
                    if (item.ml) {
                        content += ` <span class="ml-note">${item.ml}</span>`;
                    }
                    if (item.note) {
                        content += ` <span class="ml-note">${item.note}</span>`;
                    }
                    if (item.optional) {
                        content += ` <span class="optional">選帶</span>`;
                    }
                    
                    html += `<span class="item-badge">${content}</span>`;
                });
                
                html += `</div></div>`;
            }
            
            html += `</div>`;
            
            // 行李類
            html += `<div class="main-category">🧳 行李類（托運/大件）</div>`;
            html += `<div class="category-row">`;
            
            for (let cat in checked) {
                html += `<div class="item-group">`;
                html += `<div class="group-title">${catInfo[cat]?.title || cat}</div>`;
                html += `<div class="items-horizontal">`;
                
                checked[cat].forEach(item => {
                    let content = `${item.icon} ${item.name}`;
                    
                    if (item.count !== undefined) {
                        content += ` <span class="count">${item.count}</span>`;
                    } else if (item.check) {
                        content += ` <span class="check">✓</span>`;
                    }
                    
                    if (item.ml) {
                        content += ` <span class="ml-note">${item.ml}</span>`;
                    }
                    if (item.note) {
                        content += ` <span class="ml-note">${item.note}</span>`;
                    }
                    if (item.optional) {
                        content += ` <span class="optional">選帶</span>`;
                    }
                    
                    html += `<span class="item-badge">${content}</span>`;
                });
                
                html += `</div></div>`;
            }
            
            html += `</div>`;
            
            html += `<div class="footnote">🔹 全部公式：上衣=天數+2 · 褲/裙=天數÷2進位 · 內衣褲=天數+3 · 襪子=天數+2 · 睡衣=天數÷3進位 · 外套${weather ? '依季節' : '1～2'} · 口罩=天數+5 · 收納袋=天數÷2 · 現金=預算×0.3 · 瓶罐標示ml</div>`;
            
            document.getElementById('resultContent').innerHTML = html;
        }

        // ==================== 初始化 ====================
        function setDefaultDate() {
            const dateInput = document.getElementById('dateInput');
            dateInput.value = '2026-07-15';
        }

        function getSelectedSpace() {
            const radios = document.getElementsByName('space');
            for (let radio of radios) {
                if (radio.checked) {
                    return parseInt(radio.value);
                }
            }
            return 10;
        }

        function clearAll() {
            document.getElementById('destInput').value = '';
            setDefaultDate();
            document.getElementById('nightsInput').value = '';
            document.getElementById('genderSelect').value = '';
            document.getElementById('swimSelect').value = '';
            // 預設選中5%
            document.querySelector('input[name="space"][value="5"]').checked = true;
            document.getElementById('resultContent').innerHTML = `
                <div class="empty-state">
                    <div class="big-icon">🧳✨</div>
                    <p>請填寫上方資訊，點擊「分析行李與行李箱」查看結果</p>
                </div>
            `;
        }

        // ==================== 綁定事件 ====================
        const destInput = document.getElementById('destInput');
        const dateInput = document.getElementById('dateInput');
        const nightsInput = document.getElementById('nightsInput');
        const genderSelect = document.getElementById('genderSelect');
        const swimSelect = document.getElementById('swimSelect');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const clearBtn = document.getElementById('clearBtn');

        setDefaultDate();

        analyzeBtn.addEventListener('click', function() {
            const remainingSpace = getSelectedSpace();
            renderResult(
                destInput.value, 
                dateInput.value, 
                nightsInput.value, 
                genderSelect.value,
                swimSelect.value,
                remainingSpace
            );
        });

        clearBtn.addEventListener('click', clearAll);

        destInput.addEventListener('keypress', (e) => e.key === 'Enter' && analyzeBtn.click());
        nightsInput.addEventListener('keypress', (e) => e.key === 'Enter' && analyzeBtn.click());

        // 空間選項樣式切換
        document.querySelectorAll('.space-option').forEach(option => {
            option.addEventListener('click', function() {
                document.querySelectorAll('.space-option').forEach(opt => {
                    opt.classList.remove('selected');
                });
                this.classList.add('selected');
                this.querySelector('input[type="radio"]').checked = true;
            });
        });
    })();
</script>
</body>
</html>
